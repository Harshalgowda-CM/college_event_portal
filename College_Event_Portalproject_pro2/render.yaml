services:
  - type: web
    name: college-event-portal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    disk:
      name: portal-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/portal_pro.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PYTHON_VERSION
        value: "3.13.0"
